# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: catdoc.spec

# add or remove files that should be synced
files_to_sync:
    - catdoc.spec
    - .packit.yaml

# name in upstream package repository/registry (e.g. in PyPI)
upstream_package_name: catdoc
upstream_tag_template: v{version}
# downstream (Fedora) RPM package name
downstream_package_name: catdoc

actions:
  # Without this, packit infers the version from the last git tag (v0.96) and
  # overwrites Version: in the spec. This reads the version from configure.ac.
  get-current-version:
    - autoconf --trace='AC_INIT:$2' configure.ac
  # No create-archive needed: packit uses a raw git archive, and autoreconf -fi
  # in the spec's %prep generates the required autotools files during the RPM build.

jobs:
- job: copr_build
  trigger: pull_request
  targets: [fedora-stable]

- job: copr_build
  trigger: release
  targets: [fedora-stable]
  owner: skierpage
  project: catdoc
